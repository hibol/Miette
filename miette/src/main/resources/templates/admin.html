<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Admin')}"></head>
<body class="container mt-5">
    <div th:replace="~{fragments/header :: site-header}"></div>
    <div th:replace="~{fragments/login-modal :: login-modal}"></div>

    <h2 class="mb-4"><i class="bi bi-gear"></i> Administration</h2>

    <div th:if="${message}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card">
        <div class="card-body">
            <h5 class="card-title">Index de recherche</h5>
            <p class="card-text text-muted">Reconstruit l'index full-text à partir de toutes les recettes existantes.</p>
            <form th:action="@{/admin/search/reindex}" method="post">
                <button type="submit" class="btn btn-warning">
                    <i class="bi bi-arrow-clockwise"></i> Reconstruire l'index
                </button>
            </form>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
