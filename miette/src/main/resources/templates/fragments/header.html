<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<!-- Fragment header -->
 <div th:fragment="site-header">
    <header class="mb-4">
        <div class="d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-2">
                <span style="font-size: 2rem;">🥖</span>
                <h1 class="mb-0 fs-4">Mes Recettes</h1>
            </div>

            <div class="d-flex align-items-center gap-2">
                <!-- Non connecté -->
                <div sec:authorize="!isAuthenticated()">
                    <button class="btn btn-outline-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#loginModal">
                        <i class="bi bi-person-circle"></i>
                        <span class="d-none d-md-inline"> Connexion</span>
                    </button>
                </div>

                <!-- Connecté -->
                <div sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-2">
                    <span class="d-none d-md-inline me-1">
                        Bonjour, <span th:text="${#authentication.name}">admin</span>
                    </span>
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" name="redirectTo" th:value="${currentPath}">
                        <button type="submit" class="btn btn-outline-secondary btn-sm">
                            <i class="bi bi-box-arrow-right"></i>
                            <span class="d-none d-md-inline"> Déconnexion</span>
                        </button>
                    </form>
                    <a th:href="@{/admin}" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-gear"></i>
                    </a>
                </div>
            </div>
        </div>
    </header>
</div>
</body>
</html>
